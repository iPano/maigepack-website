# Production Configuration for Railway Deployment
server.port=${PORT:8080}

# Database Configuration (Railway PostgreSQL)
# DATABASE_URL is in "postgresql://user:pass@host:port/db" format.
# DataSourceConfig.java parses this into a proper JDBC URL at runtime.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 in prod
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# JPA/Hibernate Configuration
# Using update so Hibernate creates/alters tables automatically on Railway.
# Flyway is disabled until we can establish a clean migration baseline.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway — disabled; Hibernate ddl-auto=update manages schema for now
spring.flyway.enabled=false

# Security
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=DEBUG
logging.level.com.maigepack=DEBUG
server.error.include-message=always
server.error.include-binding-errors=always

# CORS Configuration for Production
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://maigepack-website.vercel.app}

# Mail Configuration (Railway environment variables)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application Configuration
app.admin.default.email=${ADMIN_EMAIL:admin@maigepack.com}
app.admin.default.password=${ADMIN_PASSWORD:changeme123}

# Upload — Cloudflare R2
app.upload.provider=${UPLOAD_PROVIDER:r2}
app.upload.r2.accountId=${R2_ACCOUNT_ID}
app.upload.r2.accessKeyId=${R2_ACCESS_KEY_ID}
app.upload.r2.secretAccessKey=${R2_SECRET_ACCESS_KEY}
app.upload.r2.bucket=${R2_BUCKET}
app.upload.r2.publicBaseUrl=${R2_PUBLIC_BASE_URL}
