# Production Configuration for Railway Deployment
server.port=${PORT:8080}

# Database Configuration (Railway PostgreSQL)
# DATABASE_URL is in "postgresql://user:pass@host:port/db" format.
# DataSourceConfig.java parses this into a proper JDBC URL at runtime.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Security
logging.level.org.springframework.security=WARN

# CORS Configuration for Production
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://maigepack.vercel.app}

# Mail Configuration (Railway environment variables)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application Configuration
app.admin.default.email=${ADMIN_EMAIL:admin@maigepack.com}
app.admin.default.password=${ADMIN_PASSWORD:changeme123}