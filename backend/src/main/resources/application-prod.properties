# Production Configuration for Railway Deployment
server.port=${PORT:8080}

# Database Configuration (Railway PostgreSQL)
# DATABASE_URL is in "postgresql://user:pass@host:port/db" format.
# DataSourceConfig.java parses this into a proper JDBC URL at runtime.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 in prod
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway — manage schema via migrations in prod
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# The Railway DB already has tables from ddl-auto=update but no Flyway history table.
# baseline-on-migrate stamps the existing schema as V1 so Flyway can run V2+ forward.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Security
logging.level.org.springframework.security=WARN

# CORS Configuration for Production
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://maigepack-website.vercel.app}

# Mail Configuration (Railway environment variables)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application Configuration
app.admin.default.email=${ADMIN_EMAIL:admin@maigepack.com}
app.admin.default.password=${ADMIN_PASSWORD:changeme123}