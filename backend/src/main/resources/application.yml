server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:magerpack}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  upload:
    provider: ${UPLOAD_PROVIDER:local}
    localDir: ${UPLOAD_LOCAL_DIR:./uploads}
  auth:
    jwtSecret: ${JWT_SECRET:change_me}
    jwtIssuer: ${JWT_ISSUER:magerpack}
  notification:
    toEmail: ${NOTIFICATION_TO_EMAIL:}

multipart:
  max-file-size: 10MB
  max-request-size: 10MB

